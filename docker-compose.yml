version: '3.8'

services:
  crm-agent:
    build: .
    container_name: crm-analytics-agent
    ports:
      - "8501:8501"
    volumes:
      # User data — persists on their machine, never inside container
      - ./data/uploads:/app/data/uploads
      - ./data/.cache:/app/data/.cache
      - ./exports:/app/exports
      - ./knowledge:/app/knowledge
      # Model cache — persists between restarts, no re-download needed
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=http://localhost:11434
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 10G
        reservations:
          memory: 6G

volumes:
  ollama_models:
    driver: local
